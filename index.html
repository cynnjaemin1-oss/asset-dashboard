<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASSET DESK — 잠실 갈아타기 트랙</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root{
    --bg:#0F1216;--panel:#171B21;--panel2:#1E242B;--border:#2A313A;
    --text:#E6E1D6;--dim:#8B93A0;--faint:#5A626E;
    --accent:#D8B14A;--pos:#56B881;--neg:#E5635E;--warn:#E0A23A;--blue:#5B8DEF;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono",Consolas,"D2Coding",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 18px 80px}
  .eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);font-weight:600}
  header.top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:22px;gap:16px;flex-wrap:wrap}
  header.top h1{margin:4px 0 0;font-size:22px;letter-spacing:.04em;font-weight:700}
  header.top .sub{color:var(--dim);font-size:12.5px;margin-top:2px}
  .qbadge{font-size:11px;color:var(--bg);background:var(--accent);padding:3px 9px;border-radius:3px;font-weight:700;letter-spacing:.04em}
  .qbadge.off{background:var(--panel2);color:var(--dim);border:1px solid var(--border)}
  .grid{display:grid;gap:14px}.g2{grid-template-columns:1.15fr .85fr}.g2b{grid-template-columns:1fr 1fr}
  @media(max-width:840px){.g2,.g2b{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:16px 16px 15px}
  .panel h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:0 0 12px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .panel h2 .hint{letter-spacing:0;text-transform:none;font-size:10.5px;color:var(--faint)}
  .hero{background:linear-gradient(160deg,#1A2129,#14181E);border:1px solid var(--border)}
  .hero .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
  .hero .big{font-family:var(--mono);font-size:42px;font-weight:600;line-height:1;margin:6px 0 2px}
  .hero .goal{color:var(--dim);font-size:13px}
  .bar{height:9px;background:var(--panel2);border-radius:5px;margin-top:13px;overflow:hidden;border:1px solid var(--border)}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#E9C766)}
  .heromini{display:flex;gap:20px;margin-top:13px;flex-wrap:wrap}
  .heromini>div .k{font-size:10.5px;color:var(--dim);letter-spacing:.06em}
  .heromini>div .v{font-family:var(--mono);font-size:16px;margin-top:1px}
  .verdict{margin-top:12px;font-size:12.5px;padding:8px 11px;border-radius:5px;border:1px solid}
  .verdict.ok{border-color:rgba(86,184,129,.4);background:rgba(86,184,129,.08);color:var(--pos)}
  .verdict.bad{border-color:rgba(229,99,94,.4);background:rgba(229,99,94,.08);color:var(--neg)}
  table{width:100%;border-collapse:collapse}
  td,th{padding:5px 4px;text-align:left;font-size:13px}
  th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600;border-bottom:1px solid var(--border)}
  td.r,th.r{text-align:right}
  tr.line td{border-bottom:1px solid rgba(42,49,58,.5)}
  input,select{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 7px;font-family:var(--mono);font-size:13px;width:100%;outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  input.txt{font-family:var(--sans);text-align:left}
  input.amt{text-align:right;width:90px}
  button{font-family:var(--sans);cursor:pointer;border-radius:4px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-size:12px;padding:4px 10px}
  button:hover{border-color:var(--accent)}
  button.x{padding:2px 7px;color:var(--neg);border-color:transparent;background:transparent;font-size:14px}
  button.x:hover{border-color:var(--neg)}
  button.add{margin-top:8px;color:var(--accent)}
  .sumrow td{border-top:1px solid var(--border);font-family:var(--mono);font-weight:600;padding-top:8px}
  .pos{color:var(--pos)}.neg{color:var(--neg)}.warn{color:var(--warn)}.acc{color:var(--accent)}.dim{color:var(--dim)}.blue{color:var(--blue)}
  .flag{font-family:var(--mono);font-size:11px;padding:1px 6px;border-radius:3px;border:1px solid var(--border)}
  .flag.go{color:var(--pos);border-color:rgba(86,184,129,.4)}
  .flag.floor{color:var(--warn);border-color:rgba(224,162,58,.4)}
  .flag.lock{color:var(--faint)}
  .pills{display:flex;gap:6px;flex-wrap:wrap}
  .pill{font-size:11.5px;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--panel2);cursor:pointer;color:var(--dim)}
  .pill.on{border-color:var(--accent);color:var(--accent);background:rgba(216,177,74,.08)}
  .pf{display:flex;align-items:center;gap:10px;padding:7px 0}
  .pf .name{width:120px;font-size:12.5px}
  .pf .track{flex:1;height:18px;background:var(--panel2);border-radius:4px;position:relative;overflow:hidden;border:1px solid var(--border)}
  .pf .tgt{position:absolute;top:0;bottom:0;width:2px;background:var(--dim)}
  .pf .act{position:absolute;top:0;bottom:0;left:0;background:rgba(216,177,74,.35)}
  .pf .d{width:74px;text-align:right;font-family:var(--mono);font-size:12.5px}
  .gauge{margin:13px 0 4px}
  .gauge .lbl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;gap:8px;flex-wrap:wrap}
  .gauge .gtrack{position:relative;height:28px;background:var(--panel2);border-radius:5px;border:1px solid var(--border);overflow:hidden}
  .gauge .have{position:absolute;top:0;bottom:0;left:0;background:rgba(86,184,129,.30)}
  .gauge .proj{position:absolute;top:0;bottom:0;background:repeating-linear-gradient(45deg,rgba(216,177,74,.20),rgba(216,177,74,.20) 6px,transparent 6px,transparent 12px);border-right:2px dashed var(--accent)}
  .gauge .gaptag{position:absolute;top:6px;right:8px;font-family:var(--mono);font-size:12px}
  .tl-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(42,49,58,.5)}
  .tl-row .dt{width:74px;font-family:var(--mono);font-size:12px;color:var(--accent);flex-shrink:0;padding-top:1px}
  .tl-row .bd{flex:1;font-size:12.5px}
  .chk{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--bg);flex-shrink:0}
  .chk.on{background:var(--pos);border-color:var(--pos)}
  .trig{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:5px;margin-bottom:7px;border:1px solid var(--border);background:var(--panel2);font-size:13px}
  .trig.fire{border-color:rgba(229,99,94,.5);background:rgba(229,99,94,.08)}
  .trig.warn{border-color:rgba(224,162,58,.45);background:rgba(224,162,58,.07)}
  .trig .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex-shrink:0}
  .trig.fire .dot{background:var(--neg)}.trig.warn .dot{background:var(--warn)}
  .trig .body{flex:1}.trig .ttl{font-weight:600}.trig .dd{font-family:var(--mono);font-size:12px;color:var(--dim)}
  .assum{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;margin-top:4px}
  .assum label{font-size:11px;color:var(--dim);display:block;letter-spacing:.04em}
  .assum .ig{display:flex;align-items:center;gap:6px}.assum .unit{color:var(--faint);font-size:11px;font-family:var(--mono)}
  .foot{margin-top:24px;color:var(--faint);font-size:11px;text-align:center;line-height:1.7}
  .reset{color:var(--faint);text-decoration:underline;cursor:pointer}
  .legend{display:flex;gap:16px;font-size:11px;color:var(--dim);margin-top:8px;justify-content:center;flex-wrap:wrap}
  .legend i{display:inline-block;width:14px;height:2px;vertical-align:middle;margin-right:5px}
  .note{font-size:11px;color:var(--faint);line-height:1.6;margin-top:11px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo}=React;
const store={get(k){try{return localStorage.getItem(k);}catch(e){return null;}},set(k,v){try{localStorage.setItem(k,v);}catch(e){}}};
const KEY="assetdesk_v4";
const won=n=>{if(n==null||isNaN(n))return"–";if(Math.abs(n)>=10000)return(n/10000).toFixed(1).replace(/\.0$/,"")+"억";return Math.round(n).toLocaleString()+"만";};
const pct=n=>(n>=0?"+":"")+n.toFixed(1)+"%p";
const uid=()=>Math.random().toString(36).slice(2,8);

// ---- v4 seed (만원) ----
const SEED={
  buckets:[
    {id:uid(),name:"위험자산 코어 (QQQM·ISA테크·반도체·BTC)",value:9300,flag:"go"},
    {id:uid(),name:"비상금 CMA",value:4240,flag:"floor"},
    {id:uid(),name:"SC 주가연계적금 (2건, 세후 만기 ~0.6억)",value:2200,flag:"mat"},
    {id:uid(),name:"연금 (IRP+연금저축, 16.5% 페널티)",value:7000,flag:"lock"},
    {id:uid(),name:"주택에퀴티 (금호파크힐스 20.7 − 대출 8.5)",value:122000,flag:"eq"},
  ],
  loan:85000, floorReserve:3100, matNet:6000, donation:2000,
  pf:{targets:{"미국테크":65,"한국반도체":20,"BTC":15},
      actuals:{"미국테크":5870,"한국반도체":2310,"BTC":1130}, drift:7},
  apt:{equity:122000, baseLoan:20000, scenario:"s1",
       targets:[{id:uid(),name:"트리지움",price:312000,s1gap:185000},
                {id:uid(),name:"잠실엘스",price:326000,s1gap:200000},
                {id:uid(),name:"리센츠",price:339000,s1gap:213000}],
       fallback:{name:"역삼럭키",gap:131000}, primary:0,
       checkYear:2029, checkMin:70000},
  scen:[{id:"s1",name:"S1 현행",extra:0,note:"대출 2억"},
        {id:"relax",name:"부분 완화",extra:40000,note:"대출 ~6억 · 승진 시"},
        {id:"normal",name:"정상화 LTV40",extra:104000,note:"대출 ~12.5억"}],
  sim:{startLiquid:11000, cap:13000, capHigh:20000, stepYear:2030, ret:8, startYear:2026, targetYear:2033},
  tl:[{id:uid(),date:"2026.06",label:"CMA ~1,300만 + 월급 마지막 일괄 deploy (65/20/15, BTC 수동). CMA 잔여 ~31M=floor",done:false},
      {id:uid(),date:"2026.11",label:"적금 만기 ~3,100만 → 딸 증여 2,000(신고·VOO/QQQM) + 위험자산 ~1,100",done:false},
      {id:uid(),date:"2027.03",label:"보너스 세후 ~1억 — 주력 탄환, 3~6개월 분할(sequence risk 완화)",done:false},
      {id:uid(),date:"2027.11",label:"적금 만기 ~3,000만 → 위험자산 65/20/15 재투입",done:false},
      {id:uid(),date:"2028",label:"둘째 휴직 전 비상금 ~4,500만 복원",done:false}],
};
function load(){const r=store.get(KEY);if(r){try{return JSON.parse(r);}catch(e){}}return JSON.parse(JSON.stringify(SEED));}

function projectLiquid(sim){
  const r=sim.ret/100,pts=[{year:sim.startYear,v:sim.startLiquid}];let v=sim.startLiquid;
  for(let y=sim.startYear+1;y<=sim.targetYear+2;y++){const c=(y>=sim.stepYear)?sim.capHigh:sim.cap;v=v*(1+r)+c;pts.push({year:y,v});}
  return pts;
}
function annualNeeded(need,sim){
  const r=sim.ret/100,n=sim.targetYear-sim.startYear;if(n<=0)return Math.max(0,need-sim.startLiquid);
  const g=Math.pow(1+r,n);return Math.max(0,(need-sim.startLiquid*g)/((g-1)/r));
}

function LineChart({pts,need,checkYear,checkMin}){
  const W=560,H=210,padL=8,padR=8,padT=14,padB=22;
  const ys=pts.map(p=>p.v);const maxV=Math.max(need,checkMin,...ys)*1.08;
  const x=i=>padL+(W-padL-padR)*(i/(pts.length-1));
  const y=v=>padT+(H-padT-padB)*(1-v/maxV);
  const line=pts.map((p,i)=>x(i)+","+y(p.v)).join(" ");
  const area=padL+","+y(0)+" "+line+" "+(W-padR)+","+y(0);
  const nY=y(need);
  const ci=pts.findIndex(p=>p.year===checkYear);
  let cross=null;
  for(let i=1;i<pts.length;i++){if(pts[i-1].v<need&&pts[i].v>=need){const t=(need-pts[i-1].v)/(pts[i].v-pts[i-1].v);cross={x:x(i-1)+(x(i)-x(i-1))*t,year:pts[i].year};break;}}
  return(<div>
    <svg viewBox={"0 0 "+W+" "+H} width="100%" style={{display:"block"}}>
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="rgba(216,177,74,.22)"/><stop offset="100%" stopColor="rgba(216,177,74,0)"/></linearGradient></defs>
      <polygon points={area} fill="url(#ag)"/>
      <line x1={padL} y1={nY} x2={W-padR} y2={nY} stroke="#56B881" strokeWidth="1" strokeDasharray="4 4"/>
      <text x={W-padR} y={nY-5} textAnchor="end" fontSize="10" fill="#56B881" fontFamily="monospace">필요 {won(need)}</text>
      <line x1={padL} y1={y(checkMin)} x2={W-padR} y2={y(checkMin)} stroke="#E5635E" strokeWidth="1" strokeDasharray="2 3" opacity=".6"/>
      <text x={padL} y={y(checkMin)-4} fontSize="9.5" fill="#E5635E" fontFamily="monospace">{checkYear}말 ≥{won(checkMin)} 필요</text>
      <polyline points={line} fill="none" stroke="#D8B14A" strokeWidth="2"/>
      {pts.map((p,i)=>(i%2===0||i===pts.length-1)&&<g key={i}><circle cx={x(i)} cy={y(p.v)} r="2.5" fill={(p.year===checkYear)?"#E5635E":"#D8B14A"}/><text x={x(i)} y={H-7} textAnchor="middle" fontSize="9.5" fill="#5A626E" fontFamily="monospace">{p.year}</text></g>)}
      {ci>=0&&<text x={x(ci)} y={y(pts[ci].v)-8} textAnchor="middle" fontSize="10" fill="#E5635E" fontFamily="monospace" fontWeight="600">{won(pts[ci].v)}</text>}
      {cross&&<g><line x1={cross.x} y1={padT} x2={cross.x} y2={H-padB} stroke="#56B881" strokeWidth="1" opacity=".5"/><text x={cross.x} y={padT+2} textAnchor="middle" fontSize="9.5" fill="#56B881" fontFamily="monospace">{cross.year} 도달</text></g>}
    </svg>
    <div className="legend"><span><i style={{background:"#D8B14A"}}></i>가용 유동자산</span><span><i style={{background:"#56B881"}}></i>필요 유동(S1 갭)</span><span><i style={{background:"#E5635E"}}></i>2029 체크포인트</span></div>
  </div>);
}

function App(){
  const init=load();
  const [bk,setBk]=useState(init.buckets);
  const [loan,setLoan]=useState(init.loan);
  const [pf,setPf]=useState(init.pf);
  const [apt,setApt]=useState(init.apt);
  const [sim,setSim]=useState(init.sim);
  const [tl,setTl]=useState(init.tl);
  const cfg={floorReserve:init.floorReserve,matNet:init.matNet,donation:init.donation,scen:init.scen};
  const [saved,setSaved]=useState("");

  useEffect(()=>{store.set(KEY,JSON.stringify({...SEED,buckets:bk,loan,pf,apt,sim,tl}));
    setSaved(new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}));},[bk,loan,pf,apt,sim,tl]);

  const totAsset=bk.reduce((s,b)=>s+(+b.value||0),0);
  const net=totAsset-loan;
  const core=bk.filter(b=>b.flag==="go").reduce((s,b)=>s+(+b.value||0),0);
  const cma=bk.filter(b=>b.flag==="floor").reduce((s,b)=>s+(+b.value||0),0);
  const cmaAvail=Math.max(0,cma-cfg.floorReserve);
  const mobToday=core+cmaAvail; // 연금·주택·적금(미실현) 제외
  const equity=apt.equity;

  const scen=cfg.scen.find(s=>s.id===apt.scenario)||cfg.scen[0];
  const needOf=t=>Math.max(0,(+t.s1gap||0)-scen.extra);
  const primaryT=apt.targets[apt.primary]||apt.targets[0];
  const need=needOf(primaryT);

  const proj=useMemo(()=>projectLiquid(sim),[sim]);
  const projAt=y=>{const p=proj.find(p=>p.year===y);return p?p.v:proj[proj.length-1].v;};
  const projTarget=projAt(sim.targetYear);
  const proj2029=projAt(apt.checkYear);
  let reachYear=null;for(const p of proj){if(p.v>=need){reachYear=p.year;break;}}
  const onTrack=reachYear&&reachYear<=sim.targetYear;
  const needAnnual=annualNeeded(need,sim);
  const capGap=needAnnual-sim.cap;
  const checkFail=proj2029<apt.checkMin;

  const pfTotal=Object.values(pf.actuals).reduce((s,v)=>s+(+v||0),0)||1;
  const drifts=Object.keys(pf.targets).map(k=>{const a=(pf.actuals[k]||0)/pfTotal*100;return{k,tgt:pf.targets[k],act:a,d:a-pf.targets[k]};});
  const driftFire=drifts.filter(d=>Math.abs(d.d)>=pf.drift);

  const now=new Date();const dday=iso=>Math.ceil((new Date(iso)-now)/86400000);
  const triggers=[];
  if(!onTrack)triggers.push({lv:"fire",ttl:`${primaryT.name} 현 궤도 미달`,sub:`현 적립 ${won(sim.cap)}/yr로는 ${reachYear||">"+ (sim.targetYear+2)}년 도달 · 목표 ${sim.targetYear} · 필요 ${won(needAnnual)}/yr (부족 ${won(Math.max(0,capGap))}/yr)`});
  if(checkFail)triggers.push({lv:"fire",ttl:`${apt.checkYear}말 가용 < ${won(apt.checkMin)} — 재평가 트리거`,sub:`현 궤도 예상 ${won(proj2029)} · 18.5억 궤도 깨짐 → 타겟 하향(${apt.fallback.name} 필요 ${won(apt.fallback.gap)}) 또는 타임라인 연장`});
  if(scen.id==="s1"&&capGap>0)triggers.push({lv:"warn",ttl:"구조적 미스매치 — capacity vs 필요",sub:`현행 규제·소득만으론 빡빡 · 승진/규제완화/타임라인 연장 중 ≥1 필요`});
  driftFire.forEach(d=>triggers.push({lv:"warn",ttl:`비중 드리프트 ${pct(d.d)} — ${d.k}`,sub:`목표 ${d.tgt}% · ±${pf.drift}%p 초과 → Mode2 리밸런싱`}));
  const dDon=dday("2026-11-01");if(dDon>0)triggers.push({lv:"warn",ttl:"딸 증여 2,000만 (2026.11 또는 조기)",sub:`D-${dDon} · 계좌개설·신고·VOO50/QQQM50 · 빠를수록 10년 클럭 유리`});
  const dBtc=dday("2027-01-01");if(dBtc>0)triggers.push({lv:"warn",ttl:"BTC 양도세 시행 (2027.1)",sub:`D-${dBtc} · 연 250만 공제 내 기계적 차익실현`});
  const dRate=dday("2029-09-01");if(dRate>0)triggers.push({lv:"warn",ttl:"주담대 금리 리셋 (2029.09)",sub:`D-${dRate} · 5년물 은행채+우대조건 사전 점검`});
  const undone=tl.find(t=>!t.done);
  if(undone)triggers.push({lv:"warn",ttl:"투입 캘린더 미완료분",sub:`${undone.date} · ${undone.label.slice(0,30)}…`});
  if([2,5,8,11].includes(now.getMonth()))triggers.push({lv:"warn",ttl:"분기 트래킹",sub:"잠실 트리오 실거래 · LTV 규제동향 · 보너스 누적"});
  if(!triggers.length)triggers.push({lv:"ok",ttl:"트리거 없음",sub:"기계적 실행만. 매월 fine-tuning 금지."});

  const upd=(s,a,id,f,v)=>s(a.map(r=>r.id===id?{...r,[f]:v}:r));
  const numv=v=>v===""?"":(+v);
  const FLAGS={go:["go","○ 엔진"],floor:["floor","△ floor"],mat:["go","○ 만기시"],lock:["lock","✕ 잠김"],eq:["go","○ 매도시"]};

  const exportData=()=>{const data={...SEED,buckets:bk,loan,pf,apt,sim,tl,_exported:new Date().toISOString()};
    const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");
    a.href=URL.createObjectURL(b);a.download="asset-desk-"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);};
  const importData=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.buckets&&!d.sim)throw 0;
      if(d.buckets)setBk(d.buckets);if(d.loan!=null)setLoan(d.loan);if(d.pf)setPf(d.pf);if(d.apt)setApt(d.apt);if(d.sim)setSim(d.sim);if(d.tl)setTl(d.tl);
      alert("불러오기 완료.");}catch(x){alert("불러오기 실패: 이 대시보드 JSON이 맞는지 확인.");}e.target.value="";};rd.readAsText(f);};

  const inQ=[2,5,8,11].includes(now.getMonth());
  return(<div className="wrap">
    <header className="top">
      <div><div className="eyebrow">Asset Command Desk · v4</div><h1>잠실 갈아타기 트랙</h1>
        <div className="sub">목표 금호 1.5배 ≈ 31억 · 진입 2032~33 · 미국테크65 / 한국반도체20 / BTC15</div></div>
      <div style={{textAlign:"right"}}>
        <span className={"qbadge"+(inQ?"":" off")}>{inQ?"분기 리뷰 시즌":"리뷰 외 — 실행만"}</span>
        <div className="sub" style={{marginTop:6}}>저장됨 {saved}</div>
        <div style={{marginTop:8,display:"flex",gap:6,justifyContent:"flex-end"}}>
          <button onClick={exportData}>내보내기</button>
          <button onClick={()=>document.getElementById("imp").click()}>불러오기</button>
          <input id="imp" type="file" accept="application/json,.json" style={{display:"none"}} onChange={importData}/></div></div>
    </header>

    <div className="grid g2" style={{marginBottom:14}}>
      <div className="panel hero">
        <div className="label">갈아타기 가용 유동자산 (동원 가능)</div>
        <div className="big">{won(mobToday)}</div>
        <div className="goal">필요 유동 <span className="acc num">{won(need)}</span> ({primaryT.name} · {scen.name}) · 격차 <span className="num">{won(need-mobToday)}</span></div>
        <div className="bar"><i style={{width:Math.min(100,mobToday/need*100)+"%"}}></i></div>
        <div className="heromini">
          <div><div className="k">순자산 (착시주의)</div><div className="v dim">{won(net)}</div></div>
          <div><div className="k">주택에퀴티</div><div className="v">{won(equity)}</div></div>
          <div><div className="k">필요 연적립</div><div className="v acc">{won(needAnnual)}/yr</div></div>
          <div><div className="k">현 capacity</div><div className={"v "+(capGap>0?"neg":"pos")}>{won(sim.cap)}/yr</div></div>
        </div>
        <div className={"verdict "+(onTrack?"ok":"bad")}>
          {onTrack?`현 가정 유지 시 ${reachYear}년 ${primaryT.name} 도달 — 목표 ${sim.targetYear} 이내 ◎`
            :`현 적립속도로는 ${sim.targetYear}년 ${won(projTarget)} (필요 ${won(need)}) — ${won(Math.max(0,capGap))}/yr 부족. 승진·규제완화·타임라인 중 ≥1 필요`}
        </div>
      </div>
      <div className="panel">
        <h2>의사결정 트리거 <span className="hint">지금 행동할 것</span></h2>
        {triggers.map((t,i)=><div key={i} className={"trig "+(t.lv==="ok"?"":t.lv)}><span className="dot"></span><div className="body"><div className="ttl">{t.ttl}</div><div className="dd">{t.sub}</div></div></div>)}
      </div>
    </div>

    <div className="panel" style={{marginBottom:14}}>
      <h2>가용 유동자산 추이 <span className="hint">예측 아님 · 가정을 바꿔 시나리오 점검</span></h2>
      <div className="grid g2">
        <LineChart pts={proj} need={need} checkYear={apt.checkYear} checkMin={apt.checkMin}/>
        <div>
          <div className="assum">
            <div><label>시작 가용유동</label><div className="ig"><input className="amt num" style={{width:"100%"}} value={sim.startLiquid} onChange={e=>setSim({...sim,startLiquid:+e.target.value||0})}/><span className="unit">만</span></div></div>
            <div><label>기대수익률(연)</label><div className="ig"><input className="amt num" style={{width:"100%"}} value={sim.ret} onChange={e=>setSim({...sim,ret:+e.target.value||0})}/><span className="unit">%</span></div></div>
            <div><label>연 적립 (현재)</label><div className="ig"><input className="amt num" style={{width:"100%"}} value={sim.cap} onChange={e=>setSim({...sim,cap:+e.target.value||0})}/><span className="unit">만</span></div></div>
            <div><label>연 적립 (승진 후)</label><div className="ig"><input className="amt num" style={{width:"100%"}} value={sim.capHigh} onChange={e=>setSim({...sim,capHigh:+e.target.value||0})}/><span className="unit">만</span></div></div>
            <div><label>승진 시점(연)</label><input className="num" value={sim.stepYear} onChange={e=>setSim({...sim,stepYear:+e.target.value||0})}/></div>
            <div><label>목표 진입연도</label><input className="num" value={sim.targetYear} onChange={e=>setSim({...sim,targetYear:+e.target.value||0})}/></div>
          </div>
          <div className="note">시작 가용유동 ≈ 코어 {won(core)} + CMA여유 {won(cmaAvail)} (연금·주택에퀴티·미실현 적금 제외). 적립의 단일 엔진은 매년 3월 보너스 — 한 해 반토막 = 갈아타기 1~2년 지연.</div>
        </div>
      </div>
    </div>

    <div className="panel" style={{marginBottom:14}}>
      <h2>규제 시나리오 <span className="hint">이 플랜 최대의 스윙 변수 · 필요 유동에 즉시 반영</span></h2>
      <div className="pills" style={{marginBottom:12}}>
        {cfg.scen.map(s=><span key={s.id} className={"pill"+(apt.scenario===s.id?" on":"")} onClick={()=>setApt({...apt,scenario:s.id})}>{s.name} · {s.note}</span>)}
      </div>
      {apt.targets.map((t,i)=>{const nd=needOf(t);const haveW=Math.min(100,mobToday/nd*100);const projW=Math.min(100,projTarget/nd*100);const ok=projTarget>=nd;
        return(<div className="gauge" key={t.id}>
          <div className="lbl">
            <span><span className={"pill"+(apt.primary===i?" on":"")} style={{padding:"1px 8px",marginRight:6}} onClick={()=>setApt({...apt,primary:i})}>{apt.primary===i?"★ 기준":"기준설정"}</span>
              <input className="txt" style={{width:90,display:"inline-block"}} value={t.name} onChange={e=>setApt({...apt,targets:apt.targets.map(x=>x.id===t.id?{...x,name:e.target.value}:x)})}/>{" "}
              <input className="amt num" style={{width:78}} value={t.price} onChange={e=>setApt({...apt,targets:apt.targets.map(x=>x.id===t.id?{...x,price:+e.target.value||0}:x)})}/> 시세 ·
              S1갭 <input className="amt num" style={{width:78}} value={t.s1gap} onChange={e=>setApt({...apt,targets:apt.targets.map(x=>x.id===t.id?{...x,s1gap:+e.target.value||0}:x)})}/></span>
            <span className={ok?"pos":"warn"}>필요 {won(nd)} · {ok?"도달 ✓":won(nd-projTarget)+" 부족"}</span>
          </div>
          <div className="gtrack">
            <div className="have" style={{width:haveW+"%"}}></div>
            <div className="proj" style={{left:haveW+"%",width:Math.max(0,projW-haveW)+"%"}}></div>
            <div className="gaptag dim">오늘 {won(mobToday)} → {sim.targetYear} {won(projTarget)}</div>
          </div>
        </div>);})}
      <div className="note">초록=오늘 가용 · 빗금=목표연도 예상 적립 · 끝=필요 유동(S1 갭). 정상화 시나리오로 바꾸면 필요 유동이 절반 이하로 — 규제완화가 가장 큰 레버.</div>
    </div>

    <div className="grid g2b" style={{marginBottom:14}}>
      <div className="panel">
        <h2>다섯 통 (동원 가능액) <span className="hint">직접 수정</span></h2>
        <table><thead><tr><th>통</th><th style={{width:74}}>갈아타기</th><th className="r" style={{width:96}}>금액</th><th style={{width:24}}></th></tr></thead>
        <tbody>{bk.map(b=>{const fl=FLAGS[b.flag]||["lock","–"];return(
          <tr className="line" key={b.id}>
            <td><input className="txt" value={b.name} onChange={e=>upd(setBk,bk,b.id,"name",e.target.value)}/></td>
            <td><select value={b.flag} onChange={e=>upd(setBk,bk,b.id,"flag",e.target.value)}><option value="go">○ 엔진</option><option value="floor">△ floor</option><option value="mat">○ 만기시</option><option value="lock">✕ 잠김</option><option value="eq">○ 매도시</option></select></td>
            <td className="r"><input className="amt num" value={b.value} onChange={e=>upd(setBk,bk,b.id,"value",numv(e.target.value))}/></td>
            <td><button className="x" onClick={()=>setBk(bk.filter(x=>x.id!==b.id))}>×</button></td></tr>);})}
          <tr className="line"><td>주담대 (대출)</td><td><span className="flag lock">차감</span></td><td className="r"><input className="amt num" value={loan} onChange={e=>setLoan(+e.target.value||0)}/></td><td></td></tr>
          <tr className="sumrow"><td>순자산 / 오늘 동원가능</td><td></td><td className="r">{won(net)} / <span className="acc">{won(mobToday)}</span></td><td></td></tr>
        </tbody></table>
        <button className="add" onClick={()=>setBk([...bk,{id:uid(),name:"새 통",value:0,flag:"go"}])}>+ 통 추가</button>
        <div className="note">연금(✕)·주택에퀴티(매도시)·미실현 적금은 ‘오늘 동원가능’에서 제외. CMA는 floor {won(cfg.floorReserve)} 초과분만 가용.</div>
      </div>

      <div className="panel">
        <h2>위험자산 밴드 <span className="hint">65/20/15 · ±{pf.drift}%p 이탈 시 Mode2</span></h2>
        {drifts.map(d=>(<div className="pf" key={d.k}><span className="name">{d.k}</span>
          <div className="track"><div className="act" style={{width:Math.min(100,d.act)+"%"}}></div><div className="tgt" style={{left:d.tgt+"%"}}></div></div>
          <span className={"d "+(Math.abs(d.d)>=pf.drift?"warn":"dim")}>{d.act.toFixed(1)}% ({pct(d.d)})</span></div>))}
        <table style={{marginTop:10}}><thead><tr><th>현재 평가액 (직접 갱신)</th>{Object.keys(pf.actuals).map(k=><th key={k} className="r">{k}</th>)}</tr></thead>
        <tbody><tr><td className="dim" style={{fontSize:11}}>만원</td>{Object.keys(pf.actuals).map(k=><td key={k} className="r"><input className="amt num" style={{width:66}} value={pf.actuals[k]} onChange={e=>setPf({...pf,actuals:{...pf.actuals,[k]:+e.target.value||0}})}/></td>)}</tr></tbody></table>
        <div className="note">전부 ±7%p 이내면 Mode1 — 목표비중 그대로, 매월 fine-tuning 금지. ETF 위주(구성종목 ≥10), 개별주 회피.</div>
      </div>
    </div>

    <div className="panel">
      <h2>투입 캘린더 & 유동성 타임라인 <span className="hint">체크 = 실행 완료</span></h2>
      {tl.map(t=>(<div className="tl-row" key={t.id}>
        <span className={"chk"+(t.done?" on":"")} onClick={()=>setTl(tl.map(x=>x.id===t.id?{...x,done:!x.done}:x))}>{t.done?"✓":""}</span>
        <span className="dt">{t.date}</span><span className="bd">{t.label}</span>
        <button className="x" onClick={()=>setTl(tl.filter(x=>x.id!==t.id))}>×</button></div>))}
      <button className="add" onClick={()=>setTl([...tl,{id:uid(),date:"2027",label:"새 이벤트",done:false}])}>+ 이벤트 추가</button>
      <div className="note">단일 엔진 = 매년 3월 보너스(보상의 ~53% 변동급). 보수 가정 1.2~1.3억, 받으면 분할 투입. 연금 적립 재개 = 갈아타기 완료 후 6개월 내.</div>
    </div>

    <div className="foot">
      모든 수치 직접 수정 가능 · 데이터는 이 브라우저에 저장 (claude.ai 미리보기 미저장, 배포 후 정상) · 기기 간 이동은 내보내기/불러오기<br/>
      “야심차게 잡되, 숫자로 점검해 자기기만은 차단한다. 2029년말 &lt; 7억이면 재평가.”<br/>
      <span className="reset" onClick={()=>{if(confirm("v4 초기값으로 되돌립니다. 입력 데이터 삭제.")){store.set(KEY,JSON.stringify(SEED));location.reload();}}}>초기값으로 리셋</span>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
